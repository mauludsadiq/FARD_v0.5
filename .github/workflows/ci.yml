name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build workspace
        run: cargo build --workspace

      - name: Run unit tests
        run: cargo test --workspace --exclude abirunner

      - name: Run conformance suite (ZProof chain)
        run: bash run_demo.sh || true

  release:
    name: Release binaries (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin fardrun \
            --bin fardfmt \
            --bin fardcheck \
            --bin fardwasm \
            --bin fardregistry \
            --bin fardlock \
            --bin fardbundle \
            --bin fardverify

      - name: Package binaries
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIST="fard-${TAG}-${{ matrix.suffix }}"
          mkdir -p "$DIST"
          for bin in fardrun fardfmt fardcheck fardwasm fardregistry fardlock fardbundle fardverify; do
            cp "target/${{ matrix.target }}/release/$bin" "$DIST/" 2>/dev/null || true
          done
          cp README.md "$DIST/"
          tar czf "${DIST}.tar.gz" "$DIST"
          echo "ASSET=${DIST}.tar.gz" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          body: |
            ## Install

            Download the archive for your platform, extract, and add to PATH:

            ```bash
            # macOS (Apple Silicon)
            curl -L https://github.com/mauludsadiq/FARD_v0.5/releases/download/${{ github.ref\_name }}/fard-${{ github.ref_name }}-macos-aarch64.tar.gz | tar xz
            sudo mv fard-${{ github.ref_name }}-macos-aarch64/fard* /usr/local/bin/

            # macOS (Intel)
            curl -L https://github.com/mauludsadiq/FARD_v0.5/releases/download/${{ github.ref\_name }}/fard-${{ github.ref_name }}-macos-x86_64.tar.gz | tar xz
            sudo mv fard-${{ github.ref_name }}-macos-x86_64/fard* /usr/local/bin/

            # Linux
            curl -L https://github.com/mauludsadiq/FARD_v0.5/releases/download/${{ github.ref\_name }}/fard-${{ github.ref_name }}-linux-x86_64.tar.gz | tar xz
            sudo mv fard-${{ github.ref_name }}-linux-x86_64/fard* /usr/local/bin/
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
